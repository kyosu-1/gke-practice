# ArgoCD v3.3.6
#
# Bootstrap procedure (3 steps):
#
#   Step 1: ArgoCD + config
#     kubectl create namespace argocd
#     kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml
#     kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
#     kubectl apply -f argocd/config/argocd-cm-patch.yaml
#     kubectl apply -f argocd/config/argocd-rbac-cm-patch.yaml
#
#   Step 2: ESO (CRD が必要なので先にデプロイ)
#     kubectl apply -f argocd/bootstrap/external-secrets.yaml
#     # ESO が Ready になるまで待つ
#     kubectl wait --for=condition=available deployment -l app.kubernetes.io/name=external-secrets -n external-secrets --timeout=300s
#
#   Step 3: root Application (残り全て自動デプロイ)
#     kubectl apply -f argocd/applications/root.yaml
#     → infra (SecretStore, ExternalSecret)
#     → echo-dev, echo-prod
#
# Directory structure:
#   argocd/bootstrap/      手動で順番に適用 (ESO)
#   argocd/applications/   root が自動管理 (infra, echo-dev, echo-prod)
#   argocd/config/         ArgoCD 自身の設定 (手動 apply)
